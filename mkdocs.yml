site_name: Wiki Formation IA générative
site_description: Ressources de la formation IA générative — Certification RS6776
docs_dir: docs

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  text: Poppins
  code: Roboto Mono
  language: fr
  palette:
    - scheme: default
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Passer en mode sombre
    - scheme: slate
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Passer en mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.integrate

extra_javascript:
  - javascripts/progress.js

nav:
  - Accueil: index.md
  - Certification RS6776:
      - Présentation: certification-rs6776.md
      - Evauation d'entrée: evaluation-entree.md
  - Formation:
      - H0 — Lancement: formation/h0.md
      - H1 — Fondamentaux IA + ROFT: formation/h1.md
      - H2 — Stratégie d'implémentation IA: formation/h2.md
      - H3 — Structurer un prompt efficace: formation/h3.md
      - H4 — Créer des visuels attractifs: formation/h4.md
      - H5 — Confidentialité et sécurité: formation/h5.md
      - H6 — Accessibilité et inclusivité: formation/h6.md
      - H7 — Éthique, IA Act, biais: formation/h7.md
      - Quiz final: formation/quiz-final.md
  - Ressources pratiques:
      - Cas pratiques métiers:
          - Vue d'ensemble: cas-pratiques/index.md
          - Assistant administratif: cas-pratiques/assistant-administratif.md
          - Communication: cas-pratiques/communication.md
          - Ressources humaines: cas-pratiques/rh.md
      - Templates pratiques:
          - Présentation: templates/index.md
          - Prompt CROFT: templates/prompt-croft.md
          - Prompt visuel: templates/prompt-visuel.md
          - Anonymisation: templates/anonymisation.md
          - Audit de biais: templates/audit-biais.md
          - Checklist accessibilité: templates/checklist-accessibilite.md
      - Fiches outils:
          - Comparatif LLM: outils/comparatif.md
          - ChatGPT: outils/chatgpt.md
          - Claude: outils/claude.md
          - Gemini: outils/gemini.md
          - Mistral: outils/mistral.md
          - Copilot: outils/copilot.md
          - Perplexity: outils/perplexity.md
          - 4D Fluency: outils/4d-fluency.md
      - Sources officielles: sources-officielles.md
      - Articles:
          - Vue d'ensemble: articles/index.md
          - Prompting avancé (Few-shot & Chain-of-thought): articles/prompting-avance.md
          - Comment éviter la "perte de mémoire": articles/contexte-memoire.md
          - Réduire les hallucinations: articles/reduction-hallucinations.md
  - Glossaire: glossaire.md

plugins:
  - search:
      lang: fr

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - pymdownx.emoji
  - pymdownx.tabbed:
      alternate_style: true
  - md_in_html
