<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu : devinez le mot suivant</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 10px;
    background: #ffffff;
    color: #1a1a1a;
  }
  .intro {
    font-size: 14px;
    color: #555555;
    margin-top: 0;
    margin-bottom: 12px;
  }
  #sentence {
    font-size: 18px;
    font-weight: 600;
    min-height: 28px;
    margin-bottom: 16px;
    color: #000000;
  }
  #choices {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .choice-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
    padding: 10px 14px;
    border: 1px solid #d5d5d5;
    border-radius: 6px;
    background: #ffffff;
    cursor: pointer;
    font-size: 14px;
    color: #1a1a1a;
    width: 100%;
  }
  .choice-btn:hover {
    background: #f5f5f5;
    border-color: #999999;
  }
  .word-label {
    min-width: 110px;
    font-weight: 500;
  }
  .bar-track {
    flex: 1;
    height: 10px;
    background: #eeeeee;
    border-radius: 5px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: #1a5fb4;
  }
  .pct-label {
    min-width: 40px;
    text-align: right;
    color: #555555;
    font-size: 12px;
  }
  #done {
    display: none;
    margin-top: 14px;
    padding: 12px;
    background: #e6f4ea;
    border: 1px solid #a8d5b5;
    border-radius: 6px;
    color: #1e4620;
    font-size: 14px;
    line-height: 1.4;
  }
  #reset {
    display: none;
    margin-top: 12px;
    padding: 8px 16px;
    border: 1px solid #999999;
    border-radius: 6px;
    background: #ffffff;
    cursor: pointer;
    font-size: 13px;
  }
  #reset:hover {
    background: #f2f2f2;
  }
</style>
</head>
<body>

<p class="intro">Choisissez le mot que vous pensez le plus probable — exactement comme le fait une IA générative :</p>
<div id="sentence"></div>
<div id="choices"></div>
<div id="done"></div>
<button id="reset">Recommencer</button>

<script>
const steps = [
  { base: "Le chat mange sa", options: [["croquette", 62], ["souris", 24], ["photo", 9], ["voiture", 5]] },
  { base: "Le chat mange sa croquette", options: [["tranquillement", 55], ["rapidement", 20], ["dans", 15], ["hier", 10]] },
  { base: "Le chat mange sa croquette tranquillement", options: [["dans", 50], ["avec", 30], ["sous", 20]] },
  { base: "Le chat mange sa croquette tranquillement dans", options: [["sa", 58], ["la", 27], ["une", 15]] }
];

let i = 0;
const sentenceEl = document.getElementById('sentence');
const choicesEl = document.getElementById('choices');
const doneEl = document.getElementById('done');
const resetBtn = document.getElementById('reset');

function render() {
  sentenceEl.textContent = steps[i].base + " ...";
  choicesEl.innerHTML = '';
  steps[i].options.forEach(([word, pct]) => {
    const row = document.createElement('button');
    row.className = 'choice-btn';
    row.setAttribute('aria-label', word + ', probabilité ' + pct + ' pourcent');
    row.innerHTML =
      '<span class="word-label">' + word + '</span>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
      '<span class="pct-label">' + pct + '%</span>';
    row.addEventListener('click', () => {
      i++;
      if (i < steps.length) {
        render();
      } else {
        sentenceEl.textContent = steps[steps.length - 1].base + " sa gamelle.";
        choicesEl.innerHTML = '';
        doneEl.style.display = 'block';
        doneEl.textContent = "Vous venez de faire ce que fait une IA générative : prédire, mot après mot, la suite la plus probable, en se basant sur ce qu'elle a appris.";
        resetBtn.style.display = 'inline-block';
      }
    });
    choicesEl.appendChild(row);
  });
}

resetBtn.addEventListener('click', () => {
  i = 0;
  doneEl.style.display = 'none';
  resetBtn.style.display = 'none';
  render();
});

render();
</script>

</body>
</html>
